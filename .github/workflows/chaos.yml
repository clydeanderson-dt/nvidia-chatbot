name: Random Chaos Engineering

on:
  schedule:
    - cron: '20 */2 * * *'  # Runs every 2 hours (120 minutes)
  workflow_dispatch:        # Manual trigger for testing

jobs:
  maybe-start-chaos:
    runs-on: ubuntu-latest
    steps:
      - name: Random decision to start chaos (~8% chance)
        id: decision
        run: |
          # Manual runs always trigger chaos
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "start=true" >> $GITHUB_OUTPUT
            echo "🎯 Manual chaos trigger activated!"
          # Scheduled runs: 8% chance = roughly 1 event per day (12 runs * 8% ≈ 1)
          elif [ $((RANDOM % 100)) -lt 8 ]; then
            echo "start=true" >> $GITHUB_OUTPUT
            echo "🎲 Chaos mode activated!"
          else
            echo "start=false" >> $GITHUB_OUTPUT
            echo "✅ Skipping chaos this cycle"
          fi
      
      - name: Select random preset
        if: steps.decision.outputs.start == 'true'
        id: preset
        run: |
          PRESETS=("slow_llm" "flaky_network" "rate_limited" "degraded")
          SELECTED=${PRESETS[$RANDOM % ${#PRESETS[@]}]}
          echo "preset=$SELECTED" >> $GITHUB_OUTPUT
          echo "🔥 Selected preset: $SELECTED"
      
      - name: Select random duration (15-90 minutes)
        if: steps.decision.outputs.start == 'true'
        id: duration
        run: |
          MIN_SECONDS=$((15 * 60))   # 15 minutes
          MAX_SECONDS=$((90 * 60))   # 90 minutes
          RANGE=$((MAX_SECONDS - MIN_SECONDS))
          DURATION=$((MIN_SECONDS + RANDOM % RANGE))
          MINUTES=$((DURATION / 60))
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "⏱️  Chaos will run for $MINUTES minutes"
      
      - name: Apply chaos preset
        if: steps.decision.outputs.start == 'true'
        run: |
          echo "Applying preset: ${{ steps.preset.outputs.preset }}"
          curl -X POST -f \
            "${{ secrets.BACKEND_URL }}/api/chaos/preset/${{ steps.preset.outputs.preset }}" \
            -H "Content-Type: application/json"
      
      - name: Send Dynatrace chaos enabled event
        if: steps.decision.outputs.start == 'true'
        run: |
          PRESET="${{ steps.preset.outputs.preset }}"
          MINUTES=$((${{ steps.duration.outputs.duration }} / 60))
          TRIGGER="${{ github.event_name == 'workflow_dispatch' && 'manual' || 'scheduled' }}"
          
          # Preset descriptions
          case "$PRESET" in
            slow_llm)
              DESCRIPTION="LLM responses delayed by 5000ms"
              ;;
            flaky_network)
              DESCRIPTION="HTTP 500 errors (30% rate) + random delays (500-2000ms)"
              ;;
            rate_limited)
              DESCRIPTION="Rate limiting enabled after 3 requests"
              ;;
            degraded)
              DESCRIPTION="LLM errors (20% rate) + empty responses (10% rate) + 1000ms delay"
              ;;
          esac
          
          curl -X POST \
            "${{ secrets.DYNATRACE_ENVIRONMENT }}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DYNATRACE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "eventType": "CUSTOM_INFO",
              "title": "Chaos Engineering: '"$PRESET"' activated",
              "entitySelector": "type(SERVICE),entityName(nvidia-chatbot)",
              "properties": {
                "event.title": "Chaos Engineering: '"$PRESET"' activated",
                "event.description": "Chaos engineering preset '"'$PRESET'"' has been applied for '"$MINUTES"' minutes",
                "chaos.preset": "'"$PRESET"'",
                "chaos.duration_minutes": "'"$MINUTES"'",
                "chaos.trigger": "'"$TRIGGER"'",
                "chaos.state": "active",
                "chaos.preset.description": "'"$DESCRIPTION"'"
              },
              "timeout": '"$MINUTES"'
            }'
      
      - name: Wait for chaos duration
        if: steps.decision.outputs.start == 'true'
        run: |
          MINUTES=$((${{ steps.duration.outputs.duration }} / 60))
          echo "Chaos active for $MINUTES minutes..."
          sleep ${{ steps.duration.outputs.duration }}
      
      - name: Reset to healthy
        if: always() && steps.decision.outputs.start == 'true'
        run: |
          echo "Resetting to healthy state"
          curl -X POST -f \
            "${{ secrets.BACKEND_URL }}/api/chaos/preset/healthy" \
            -H "Content-Type: application/json"
      
      - name: Send Dynatrace chaos disabled event
        if: always() && steps.decision.outputs.start == 'true'
        run: |
          TRIGGER="${{ github.event_name == 'workflow_dispatch' && 'manual' || 'scheduled' }}"
          
          curl -X POST \
            "${{ secrets.DYNATRACE_ENVIRONMENT }}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${{ secrets.DYNATRACE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "eventType": "CUSTOM_INFO",
              "title": "Chaos Engineering: Reset to healthy",
              "entitySelector": "type(SERVICE),entityName(nvidia-chatbot)",
              "properties": {
                "event.title": "Chaos Engineering: Reset to healthy",
                "event.description": "Chaos engineering has been disabled, system returned to normal operation",
                "chaos.preset": "healthy",
                "chaos.state": "inactive",
                "chaos.trigger": "'"$TRIGGER"'"
              },
              "timeout": 1
            }'
      
      - name: Verify healthy state
        if: always() && steps.decision.outputs.start == 'true'
        run: |
          echo "Verifying chaos is disabled..."
          curl -X GET \
            "${{ secrets.BACKEND_URL }}/api/chaos/status" \
            -H "Content-Type: application/json"
