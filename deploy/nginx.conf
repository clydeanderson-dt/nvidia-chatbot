# /etc/nginx/sites-available/chatbot
# Symlink to sites-enabled:
#   sudo ln -s /etc/nginx/sites-available/chatbot /etc/nginx/sites-enabled/chatbot
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    # -----------------------------------------------------------------------
    # Gzip — compress text assets before sending to the browser.
    # -----------------------------------------------------------------------
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        application/javascript
        application/json
        application/wasm
        font/woff2
        image/svg+xml
        text/css
        text/plain;
    listen 80;
    # Replace _ with your VM's IP address or DNS hostname.
    server_name _;

    access_log /var/log/nginx/chatbot.access.log;
    error_log  /var/log/nginx/chatbot.error.log;

    # Security headers.
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header Referrer-Policy         "strict-origin"     always;

    # React build artefacts live here after:
    #   npm ci && npm run build
    #   sudo cp -r frontend/dist/* /var/www/chatbot/
    root  /var/www/chatbot;
    index index.html;

    # Long-lived cache for Vite's content-hashed static bundles.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|webp|avif|gif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # Single-page app: unknown paths fall back to index.html.
    # Never cache index.html so deploys take effect immediately.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------------------------
    # Proxy /api/* → FastAPI backend.
    # proxy_buffering MUST stay off — the chat endpoint uses Server-Sent Events.
    # ---------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE — disable all buffering and caching.
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        3600s;
        chunked_transfer_encoding on;
    }
}
