id: 9c545216-e155-448e-b81a-63348b10db02
title: AI Chatbot — Weekly Model Optimization Report
description: Weekly model-distribution recommendation for the AI Chatbot. Each task answers one focused question (single-responsibility); Davis CoPilot synthesizes the recommendation across cost, latency, throughput, stability, and SLO compliance for both the chat and suggestions workloads.
actor: 4553845d-739e-46b5-8976-fdfc833cab12
owner: 4553845d-739e-46b5-8976-fdfc833cab12
ownerType: USER
isPrivate: false
isDeployed: true
schemaVersion: 4
type: STANDARD
hourlyExecutionLimit: 1000
triggerType: Schedule
trigger:
  schedule:
    filterParameters:
      earliestStart: "2026-06-23"
    inputs: {}
    isActive: true
    isFaulty: false
    rule: null
    timezone: America/New_York
    trigger:
      type: cron
      cron: "0 8 * * 1"
tasks:
  # ─────────────────────────────────────────────────────────────
  # CHAT workload (chat_response.workflow)
  # ─────────────────────────────────────────────────────────────

  chat_workflow_scorecard:
    action: dynatrace.automations:execute-dql-query
    description: Chat workflow per-model scorecard for the last 7 days — request count, latency percentiles, error rate.
    name: chat_workflow_scorecard
    position: { x: -6, y: 1 }
    predecessors: []
    input:
      query: |-
        fetch spans, from: now()-7d
        | filter dt.service.name == "nvidia-chatbot"
        | filter span.name == "chat_response.workflow"
        | filter isNotNull(llm.model)
        | summarize {
            requests = count(),
            errors = countIf(request.is_failed == true),
            p50_ms = percentile(toLong(duration), 50) / 1000000,
            p95_ms = percentile(toLong(duration), 95) / 1000000,
            p99_ms = percentile(toLong(duration), 99) / 1000000
          }, by: { model = llm.model }
        | fieldsAdd error_rate_pct = round((toDouble(errors) / toDouble(requests)) * 100.0, decimals: 2)
        | sort requests desc

  chat_workflow_scorecard_prior:
    action: dynatrace.automations:execute-dql-query
    description: Chat workflow per-model scorecard for the prior 7 days (week-over-week baseline).
    name: chat_workflow_scorecard_prior
    position: { x: -6, y: 2 }
    predecessors: []
    input:
      query: |-
        fetch spans, from: now()-14d, to: now()-7d
        | filter dt.service.name == "nvidia-chatbot"
        | filter span.name == "chat_response.workflow"
        | filter isNotNull(llm.model)
        | summarize {
            requests = count(),
            errors = countIf(request.is_failed == true),
            p50_ms = percentile(toLong(duration), 50) / 1000000,
            p95_ms = percentile(toLong(duration), 95) / 1000000,
            p99_ms = percentile(toLong(duration), 99) / 1000000
          }, by: { model = llm.model }
        | fieldsAdd error_rate_pct = round((toDouble(errors) / toDouble(requests)) * 100.0, decimals: 2)
        | sort requests desc

  chat_llm_economics:
    action: dynatrace.automations:execute-dql-query
    description: Chat per-model token usage and cost for the last 7 days. Pricing inlined at USD 0.10 / 1M input tokens and USD 0.40 / 1M output tokens.
    name: chat_llm_economics
    position: { x: -4, y: 1 }
    predecessors: []
    input:
      query: |-
        fetch spans, from: now()-7d
        | filter dt.service.name == "nvidia-chatbot"
        | filter span.name == "ChatNVIDIA.chat"
        | filter isNotNull(gen_ai.usage.input_tokens)
        | fieldsAdd join_key = span.parent_id
        | join [
            fetch spans, from: now()-7d
            | filter dt.service.name == "nvidia-chatbot"
            | filter in(span.name, {"chat_suggestions.task", "chat_starter_suggestions.task"})
            | fieldsAdd join_key = span.id
          ], on: { join_key }, kind: leftOuter
        | filter isNotNull(right.span.name) != true
        | summarize {
            calls = count(),
            in_tokens = sum(gen_ai.usage.input_tokens),
            out_tokens = sum(gen_ai.usage.output_tokens),
            avg_in_tokens = round(avg(gen_ai.usage.input_tokens)),
            avg_out_tokens = round(avg(gen_ai.usage.output_tokens))
          }, by: { model = gen_ai.request.model }
        | fieldsAdd cost_usd = round((toDouble(in_tokens) / 1000000.0) * 0.10 + (toDouble(out_tokens) / 1000000.0) * 0.40, decimals: 4)
        | fieldsAdd cost_per_call_usd = round(cost_usd / toDouble(calls), decimals: 6)
        | fieldsAdd cost_per_1k_out_usd = if(toDouble(out_tokens) > 0, round(cost_usd / (toDouble(out_tokens) / 1000.0), decimals: 6), else: 0.0)
        | sort calls desc

  chat_throughput:
    action: dynatrace.automations:execute-dql-query
    description: Chat per-model throughput — average output tokens per second for the last 7 days.
    name: chat_throughput
    position: { x: -2, y: 1 }
    predecessors: []
    input:
      query: |-
        fetch spans, from: now()-7d
        | filter dt.service.name == "nvidia-chatbot"
        | filter span.name == "ChatNVIDIA.chat"
        | filter isNotNull(gen_ai.usage.output_tokens)
        | filter toLong(duration) > 0
        | fieldsAdd join_key = span.parent_id
        | join [
            fetch spans, from: now()-7d
            | filter dt.service.name == "nvidia-chatbot"
            | filter in(span.name, {"chat_suggestions.task", "chat_starter_suggestions.task"})
            | fieldsAdd join_key = span.id
          ], on: { join_key }, kind: leftOuter
        | filter isNotNull(right.span.name) != true
        | fieldsAdd tps = toDouble(gen_ai.usage.output_tokens) / (toDouble(duration) / 1000000000.0)
        | summarize avg_tokens_per_sec = round(avg(tps), decimals: 1), by: { model = gen_ai.request.model }
        | sort avg_tokens_per_sec desc

  chat_slo_compliance:
    action: dynatrace.automations:execute-dql-query
    description: Chat per-model SLO compliance for the last 7 days — percentage of workflow requests completing under 3000 ms.
    name: chat_slo_compliance
    position: { x: 0, y: 1 }
    predecessors: []
    input:
      query: |-
        fetch spans, from: now()-7d
        | filter dt.service.name == "nvidia-chatbot"
        | filter span.name == "chat_response.workflow"
        | filter isNotNull(llm.model)
        | fieldsAdd under_slo = if(toLong(duration) < 3000000000, 1, else: 0)
        | summarize {
            requests = count(),
            under_slo = sum(under_slo)
          }, by: { model = llm.model }
        | fieldsAdd slo_pct = round((toDouble(under_slo) / toDouble(requests)) * 100.0, decimals: 1)
        | fields model, requests, slo_pct
        | sort slo_pct desc

  # ─────────────────────────────────────────────────────────────
  # SUGGESTIONS workload (chat_suggestions.task + chat_starter_suggestions.task)
  # ─────────────────────────────────────────────────────────────

  suggestions_workflow_scorecard:
    action: dynatrace.automations:execute-dql-query
    description: Suggestions workflow per-model scorecard for the last 7 days — request count, latency percentiles, error rate.
    name: suggestions_workflow_scorecard
    position: { x: 2, y: 1 }
    predecessors: []
    input:
      query: |-
        fetch spans, from: now()-7d
        | filter dt.service.name == "nvidia-chatbot"
        | filter in(span.name, {"chat_suggestions.task", "chat_starter_suggestions.task"})
