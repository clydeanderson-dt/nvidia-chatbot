  # ─────────────────────────────────────────────────────────────
  # Davis CoPilot synthesis
  # ─────────────────────────────────────────────────────────────

  report_prompt:
    action: dynatrace.davis.copilot.workflow.actions:davis-copilot
    description: Synthesize a model-distribution recommendation across cost, latency, throughput, and stability using all per-task metrics.
    name: report_prompt
    position: { x: 0, y: 3 }
    predecessors:
      - chat_workflow_scorecard
      - chat_workflow_scorecard_prior
      - chat_llm_economics
      - chat_throughput
      - chat_slo_compliance
      - suggestions_workflow_scorecard
      - suggestions_workflow_scorecard_prior
      - suggestions_llm_economics
      - suggestions_throughput
      - suggestions_slo_compliance
    conditions:
      else: SKIP
      states:
        chat_workflow_scorecard: OK
        chat_workflow_scorecard_prior: OK
        chat_llm_economics: OK
        chat_throughput: OK
        chat_slo_compliance: OK
        suggestions_workflow_scorecard: OK
        suggestions_workflow_scorecard_prior: OK
        suggestions_llm_economics: OK
        suggestions_throughput: OK
        suggestions_slo_compliance: OK
    retry:
      count: 2
      delay: 30
      failedLoopIterationsOnly: true
    input:
      autoTrim: true
      config: disabled
      instruction: |-
        You are an SRE writing a concise weekly status note for a non-technical reader.
        Style rules (strict):
        - Whole report under 200 words.
        - No tables, no scorecards, no raw data dumps. The reader will open Dynatrace for deep numbers.
        - Plain English. Short sentences. Avoid jargon: say "slowest 5% of requests" not "p95", "meeting the speed target" not "SLO compliance", "occasional very slow responses" not "tail risk".
        - It is fine to cite a model name and one or two grounding numbers (e.g. "about 20% cheaper", "saves roughly $4/week") sparingly.
        - Skip any model with fewer than 50 requests this week — do not mention it. If a workload has no usable data, say so in one sentence.
        Pricing assumed: $0.10 per 1M input tokens, $0.40 per 1M output tokens. Speed targets: chat under 3 seconds, suggestions under 1 second. Model routing is controlled by two DevCycle flags: `llm-model-chat` and `llm-model-suggestions`.
      prompt: |-
        Analyze the supplementary JSON data and produce a short weekly status note for the AI Chatbot service covering both the chat and suggestions workloads. Compare each model's cost, speed, and reliability, compare this week against the prior week, and recommend how to redistribute traffic between models.

        Use exactly these four sections, in this order, with these markdown headers:

        ## How things went this week
        Two or three sentences on overall health. Was chat fast enough? Were suggestions fast enough? Anything broken? Avoid numbers unless one really matters.

        ## What changed since last week
        Two or three sentences. Did any model get noticeably faster, slower, more expensive, or more error-prone compared to the prior week? If nothing meaningful changed, write "Nothing major changed this week." and stop the section.

        ## Recommendation
        One short paragraph, 3 to 4 sentences. Recommend how to shift traffic between models for chat and for suggestions. Be specific about which model should get more or less traffic and explain why in plain words (cost, speed, or reliability). Mention the rough weekly dollar impact only if it is meaningful.

        ## What to do
        Two or three bullets describing the concrete change to make in the DevCycle flags `llm-model-chat` and `llm-model-suggestions`. Plain language, e.g. "Send 70% of chat traffic to model X and 30% to model Y."
      supplementary: |-
        {
          "pricing_usd": { "per_1m_input": 0.10, "per_1m_output": 0.40 },
          "slo_targets_ms": { "chat_p95": 3000, "suggestions_p95": 1000 },
          "chat": {
            "scorecard_7d": {{ result("chat_workflow_scorecard")["records"] }},
            "scorecard_prior_7d": {{ result("chat_workflow_scorecard_prior")["records"] }},
            "economics_7d": {{ result("chat_llm_economics")["records"] }},
            "throughput_7d": {{ result("chat_throughput")["records"] }},
            "slo_compliance_7d": {{ result("chat_slo_compliance")["records"] }}
          },
          "suggestions": {
            "scorecard_7d": {{ result("suggestions_workflow_scorecard")["records"] }},
            "scorecard_prior_7d": {{ result("suggestions_workflow_scorecard_prior")["records"] }},
            "economics_7d": {{ result("suggestions_llm_economics")["records"] }},
            "throughput_7d": {{ result("suggestions_throughput")["records"] }},
            "slo_compliance_7d": {{ result("suggestions_slo_compliance")["records"] }}
          }
        }

  # ─────────────────────────────────────────────────────────────
  # Email delivery
  # ─────────────────────────────────────────────────────────────

  send_email:
    action: dynatrace.email:send-email
    description: Send the weekly model-optimization report email.
    name: send_email
    position: { x: 0, y: 4 }
    predecessors:
      - report_prompt
    conditions:
      states:
        report_prompt: OK
    input:
      to:
        - clyde.anderson@dynatrace.com
      cc: []
      bcc: []
      subject: "AI Chatbot — Weekly Model Optimization Report"
      content: |-
        📊 **Quick Links:** [Simple Dashboard](https://tsy86276.sprint.apps.dynatracelabs.com/ui/apps/dynatrace.dashboards/dashboard/f2960c3a-0bee-4b99-808d-a8420c6d4469) · [LLM Comparison (A/B)](https://tsy86276.sprint.apps.dynatracelabs.com/ui/apps/dynatrace.dashboards) · [Backend Service](https://tsy86276.sprint.apps.dynatracelabs.com/ui/apps/dynatrace.services/explorer/services?detailsId=SERVICE-7A4326FA5BAC72C3)

        ---

        {{ result("report_prompt")["text"] }}
