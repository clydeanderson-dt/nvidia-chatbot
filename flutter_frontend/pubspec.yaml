name: ai_assist
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  http: ^1.4.0
  provider: ^6.1.0
  flutter_markdown: ^0.7.6
  uuid: ^4.5.1
  dynatrace_flutter_plugin: ^3.333.1
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"  # 1024x1024 recommended
  remove_alpha_ios: true  # Required for Apple App Store